<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taj Palchaudhuri — UX Design Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--fg); font-family: var(--font-sans, 'Space Grotesk', sans-serif); --font-sans: 'Space Grotesk', sans-serif; --font-serif: 'Cormorant Garamond', serif; min-height: 100vh; transition: background 0.4s, color 0.4s; }
    #root { min-height: 100vh; }

    /* === THEMES === */
    [data-theme="warm"] {
      --bg: oklch(97% 0.008 75);
      --bg2: oklch(93% 0.01 75);
      --bg3: oklch(89% 0.012 75);
      --fg: oklch(13% 0.012 75);
      --fg2: oklch(38% 0.01 75);
      --fg3: oklch(55% 0.008 75);
      --accent: #E8635A;
      --accent-light: oklch(88% 0.06 30);
      --border: oklch(85% 0.01 75);
      --border-strong: oklch(75% 0.015 75);
      --nav-bg: oklch(97% 0.008 75 / 0.92);
    }
    [data-theme="slate"] {
      --bg: oklch(96% 0.006 230);
      --bg2: oklch(91% 0.008 230);
      --bg3: oklch(86% 0.01 230);
      --fg: oklch(14% 0.015 240);
      --fg2: oklch(35% 0.015 240);
      --fg3: oklch(52% 0.01 240);
      --accent: #E8635A;
      --accent-light: oklch(88% 0.06 30);
      --border: oklch(84% 0.01 230);
      --border-strong: oklch(72% 0.015 230);
      --nav-bg: oklch(96% 0.006 230 / 0.92);
    }
    [data-theme="dark"] {
      --bg: oklch(13% 0.01 280);
      --bg2: oklch(18% 0.012 280);
      --bg3: oklch(23% 0.015 280);
      --fg: oklch(92% 0.005 280);
      --fg2: oklch(68% 0.01 280);
      --fg3: oklch(50% 0.01 280);
      --accent: #E8635A;
      --accent-light: oklch(35% 0.08 30);
      --border: oklch(22% 0.015 280);
      --border-strong: oklch(32% 0.015 280);
      --nav-bg: oklch(13% 0.01 280 / 0.92);
    }

    /* === NAV === */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid var(--border);
    }
    .nav-bird { height: 28px; width: auto; opacity: 0.85; display: block; }
    .nav-name-wrap { display: flex; align-items: center; gap: 0.65rem; cursor: pointer; }
    .nav-name {
      font-family: var(--font-title, 'Cormorant Garamond', serif);
      font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em;
      color: var(--fg); cursor: pointer;
    }
    .nav-links { display: flex; gap: 2.5rem; align-items: center; }
    .nav-link {
      font-size: 0.8125rem; font-weight: 400; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--fg2);
      background: none; border: none; cursor: pointer;
      padding: 0; transition: color 0.2s;
    }
    .nav-link:hover, .nav-link.active { color: var(--fg); }
    .nav-link.active { color: var(--accent); }

    /* === PAGE TRANSITIONS === */
    .page-enter { animation: pageIn 0.35s ease forwards; }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* === LAYOUT === */
    .page { padding-top: 0; min-height: 100vh; }
    .page-header { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 2rem; padding: 1.75rem 0 1.25rem; }
    .page-header-id { display: flex; align-items: center; gap: 0.25rem; cursor: pointer; }
    .page-header-id img { height: 40px; width: auto; }
    .page-header-name { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; color: #f4f1ea; font-family: var(--font-sans, 'Space Grotesk', sans-serif); }
    .page-header-nav { display: flex; gap: 2rem; }
    .page-header-link { background: none; border: 0; padding: 0; cursor: pointer; font-size: 0.8125rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(244,241,234,0.6); transition: color 0.2s; text-decoration: none; }
    .page-header-link:hover, .page-header-link.active { color: #E8635A; }
    .container { max-width: 1080px; margin: 0 auto; padding: 0 3rem; }

    .page-home { background: #0a0a0a; }
    /* === BANDS === */
    .band { box-shadow: 0 0 0 100vmax var(--band-bg); clip-path: inset(-1px -100vmax); background: var(--band-bg); }
    .band-dark { --band-bg: #0a0a0a; color: #f4f1ea; padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .band-light { --band-bg: #ececea; color: var(--fg); padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .band-cases { padding-bottom: calc(0.5rem + 30px); }
    .band-dark .section-label { color: #E8635A; }
    .band-dark .section-line { background: rgba(244,241,234,0.25); }
    .band-dark .capability { border-top-color: rgba(244,241,234,0.18); }
    .band-dark .hero-byline-name { color: #f4f1ea; }
    .band-dark .hero-byline-desc { color: #c8c4ba; }
    .band-dark .hero-byline-rule { background: rgba(244,241,234,0.25); }
    .band-dark .hero-declaration { color: #f4f1ea; }
    .band-dark .hero-declaration em { color: #E8635A; }

    .band + .band > .container { position: relative; }
    .band + .band > .container::before {
      content: ""; display: block; height: 2px; background: rgba(244,241,234,0.25);
      margin: 0 0 0 0;
      position: absolute; top: 0; left: 3rem; right: 3rem;
    }
    .band-light + .band-dark > .container::before,
    .band-dark + .band-light > .container::before { background: rgba(244,241,234,0.25); }

    /* === HERO === */
    .hero { padding: 2rem 0 0.5rem; }
    .hero-row { display: grid; grid-template-columns: auto 1px 1fr; gap: 2.5rem; align-items: center; }
    @media (max-width: 720px) { .hero-row { grid-template-columns: 1fr; gap: 1.5rem; } .hero-vrule { display: none; } }
    .hero-id { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.6rem; }
    .hero-id img { height: 96px; width: auto; }
    .hero-id-name { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.015em; white-space: nowrap; color: #f4f1ea; font-family: var(--font-sans, 'Space Grotesk', sans-serif); }
    .hero-vrule { width: 1px; height: 70%; min-height: 180px; background: rgba(244,241,234,0.25); align-self: center; }
    .hero-declaration {
      font-family: var(--font-title, 'DM Sans', sans-serif);
      font-size: clamp(2.4rem, 4.6vw, 4.8rem);
      font-weight: 400; line-height: 0.92;
      letter-spacing: -0.015em; color: var(--fg);
      margin-bottom: 2rem;
    }
    .hero-declaration em { font-family: var(--font-serif, 'Cormorant Garamond', serif); font-style: italic; color: var(--fg); font-weight: 300; font-size: 0.72em; }
    .hero-byline {
      display: grid; grid-template-columns: 1fr 1px auto; gap: 2.5rem; align-items: center;
      margin-top: 2rem; padding-top: 1.5rem;
    }
    @media (max-width: 720px) { .hero-byline { grid-template-columns: 1fr; } .hero-byline-vrule { display: none; } }
    .hero-byline-vrule { width: 1px; height: 100%; min-height: 80px; background: rgba(244,241,234,0.25); }
    .hero-byline-name {
      font-size: 1.0625rem; font-weight: 600; letter-spacing: -0.01em;
      color: var(--fg); white-space: nowrap;
    }
    .hero-byline-rule { width: 1px; height: 2.5rem; background: var(--border-strong); }
    .hero-byline-desc {
      font-size: 0.9375rem; line-height: 1.7; color: var(--fg2);
      font-weight: 300; text-wrap: pretty;
    }
    .hero-byline-stats { display: flex; gap: 2rem; flex-shrink: 0; }
    .hero-stat { text-align: center; }
    .hero-stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 600; line-height: 1; color: var(--fg);
    }
    .hero-stat-label {
      font-size: 0.6875rem; color: var(--fg3); letter-spacing: 0.06em;
      text-transform: uppercase; margin-top: 0.15rem;
    }

    .band-dark .case-title { color: #f4f1ea; }
    .band-dark .case-desc { color: #c8c4ba; }
    .band-dark .case-item { border-color: rgba(244,241,234,0.18); }
    .band-dark .case-num-spacer { color: transparent; }
    .band-dark .tag { color: #c8c4ba; border-color: rgba(244,241,234,0.22); background: transparent; }
    .band-dark .case-arrow { color: #f4f1ea; }

    /* === CASE STUDY INDEX === */
    .section-header { padding: 3.125rem 0 1rem; display: flex; align-items: baseline; gap: 1.5rem; }
    .section-line { display: none; }
    .section-label {
      font-size: 0.95rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: #E8635A; font-style: normal;
      font-family: var(--font-sans, 'Space Grotesk', sans-serif);
    }
    .band-light .section-label { color: var(--accent); }
    }
    .section-line { flex: 1; height: 2px; background: var(--border); }

    /* Two-column case study grid */
    .case-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem 3rem; }
    @media (max-width: 720px) { .case-stack { grid-template-columns: 1fr; gap: 3rem; } }
    .case-item { cursor: pointer; padding-bottom: 0; }
    .case-image-wrap {
      width: 100%; aspect-ratio: 1080 / 480; height: auto; overflow: hidden;
      position: relative; background: var(--bg2); margin-bottom: 1.75rem;
    }
    .case-image-inner {
      width: 100%; height: 100%;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .case-item:hover .case-image-inner { transform: scale(1.025); }
    .case-image-inner svg { width: 100%; height: 100%; display: block; }
    .case-image-label {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 0.8125rem; color: var(--fg3); letter-spacing: 0.04em;
      pointer-events: none;
    }
    .case-info-row {
      display: flex; align-items: baseline; justify-content: space-between; gap: 2rem;
      margin-bottom: 0.65rem;
    }
    .case-info-left { display: flex; align-items: baseline; gap: 1.25rem; }
    .case-num {
      font-family: var(--font-title, 'DM Sans', sans-serif);
      font-size: clamp(1.375rem, 2vw, 1.75rem); color: #ffffff; font-weight: 500;
      flex-shrink: 0;
    }
    .case-title {
      font-family: var(--font-title, 'Cormorant Garamond', serif);
      font-size: clamp(1.375rem, 2vw, 1.75rem);
      font-weight: 400; color: var(--fg); line-height: 1.1;
      letter-spacing: -0.02em;
      transition: color 0.25s;
    }
    .case-item:hover .case-title { color: var(--accent); }
    .case-info-right { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .case-tag-row { display: flex; align-items: center; gap: 1.25rem; margin-top: 0.85rem; }
    .case-num-spacer {
      font-family: var(--font-title, 'DM Sans', sans-serif);
      font-size: clamp(1.375rem, 2vw, 1.75rem); font-weight: 500;
      visibility: hidden;
    }
    .case-tags { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 0.3rem 0.65rem;
      border: 1px solid var(--border-strong); border-radius: 2px;
      color: var(--fg3); white-space: nowrap;
    }
    .case-arrow {
      font-size: 1.125rem; color: var(--fg3);
      transition: transform 0.25s, color 0.25s;
    }
    .case-item:hover .case-arrow { transform: translateX(5px); color: var(--accent); }
    .case-desc {
      font-size: 0.9375rem; color: var(--fg2); font-weight: 300;
      line-height: 1.65; max-width: 640px; text-wrap: pretty;
      margin-top: 0.75rem;
    }

    /* === CASE STUDY PAGE === */
    .cs-back {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.8125rem; color: var(--fg3); cursor: pointer;
      background: none; border: none;
      padding: 2.5rem 0 0;
      transition: color 0.2s; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .cs-back:hover { color: var(--accent); }
    .cs-header { padding: 2rem 0 3.5rem; border-bottom: 2px solid var(--border); }
    .cs-eyebrow { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .cs-title {
      font-family: var(--font-title, 'Cormorant Garamond', serif);
      font-size: clamp(2.75rem, 5vw, 4.5rem);
      font-weight: 400; line-height: 1.0; letter-spacing: -0.03em;
      color: var(--fg); margin-bottom: 1.5rem; max-width: 800px;
    }
    .cs-subtitle {
      font-size: 1.0625rem; color: var(--fg2); line-height: 1.7;
      max-width: 640px; font-weight: 300; text-wrap: pretty;
    }
    .cs-meta-row {
      display: flex; gap: 3rem; padding: 2.5rem 0; border-bottom: 2px solid var(--border);
    }
    .cs-meta-item { }
    .cs-meta-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg3); margin-bottom: 0.4rem; }
    .cs-meta-value { font-size: 0.9375rem; color: var(--fg); font-weight: 400; }

    .cs-placeholder {
      width: 100%; height: 420px; margin: 3rem 0;
      border-radius: 4px; overflow: hidden;
      position: relative; background: var(--bg2);
    }
    .cs-placeholder svg { width: 100%; height: 100%; }
    .cs-challenge-row .cs-placeholder { margin: 0; }
    .cs-placeholder-label {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 0.8125rem; color: var(--fg3); letter-spacing: 0.05em;
    }

    .cs-body { padding: 3rem 0; }
    .cs-section { margin-bottom: 3rem; }
    .cs-section-title {
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 1rem;
    }
    .cs-text {
      font-size: 1rem; line-height: 1.8; color: var(--fg2);
      max-width: 680px; font-weight: 300; text-wrap: pretty;
    }

    /* Full-width "The Solution" section */
    .cs-solution { padding: calc(4rem - 45px) 0 4.5rem; }
    .cs-solution .section-header { padding-top: 0; }
    .cs-solution-media {
      display: grid; grid-template-columns: 1fr; gap: 2rem;
      width: 100%;
    }
    .cs-solution-image {
      width: 100%; aspect-ratio: 16 / 9;
      display: block; cursor: zoom-in; overflow: hidden;
      border-radius: 4px;
      background: #f4f3ee;
    }
    .cs-solution-image img {
      width: 100%; height: 100%; display: block;
      object-fit: contain; object-position: center;
      transition: opacity 0.2s;
    }
    .cs-solution-image.is-crop img {
      object-fit: cover; object-position: top center;
    }
    .cs-solution-image:hover img { opacity: 0.85; }

    .cs-zoom { transition: opacity 0.2s; }
    .cs-zoom:hover { opacity: 0.88; }

    /* Lightbox overlay */
    .cs-lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 3rem; cursor: zoom-out;
      animation: lb-fade 0.18s ease-out;
    }
    @keyframes lb-fade { from { opacity: 0; } to { opacity: 1; } }
    .cs-lightbox img {
      max-width: 100%; max-height: 100%;
      width: auto; height: auto; display: block;
      border-radius: 4px; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .cs-lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: none; border: 0; color: #f4f1ea; cursor: pointer;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      font-family: var(--font-sans, 'Space Grotesk', sans-serif);
      padding: 0.5rem 0.75rem;
    }
    .cs-lightbox-close:hover { color: #E8635A; }

    .cs-outcomes {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem; margin-top: 1.5rem;
    }
    .cs-outcome {
      padding: 1.5rem; background: var(--bg2);
      border-left: 2px solid var(--accent); border-radius: 2px;
    }
    .cs-outcome-num {
      font-family: var(--font-serif, 'Cormorant Garamond', serif);
      font-size: 2.25rem; font-weight: 600; color: var(--fg);
      line-height: 1;
    }
    .cs-outcome-label { font-size: 0.84375rem; color: var(--fg2); margin-top: 0.35rem; font-weight: 300; }

    .page-case { background: #0a0a0a; color: #f4f1ea; }
    .page-case .cs-back { color: #c8c4ba; }
    .page-case .cs-back:hover { color: var(--accent); }
    .page-case .cs-header { border-bottom-color: rgba(244,241,234,0.18); }
    .page-case .cs-eyebrow { color: var(--accent); }
    .page-case .cs-title { color: #f4f1ea; }
    .page-case .cs-summary { color: #c8c4ba; }
    .page-case .cs-subtitle { color: #f4f1ea; }
    .cs-impact-lead { margin: 2.5rem 0 1rem; }
    .page-case .cs-meta-row { border-bottom-color: rgba(244,241,234,0.18); }
    .page-case .cs-meta-label { color: #8a877f; }
    .page-case .cs-meta-value { color: #f4f1ea; }
    .page-case .cs-section-title { color: var(--accent); }
    .page-case .cs-text { color: #c8c4ba; }
    .page-case .cs-outcome { background: #ececea; color: var(--fg); border-left: none; border-radius: 4px; padding: 1.75rem 1.5rem; }
    .page-case .cs-outcome-num { color: #0a0a0a; font-family: var(--font-sans, 'Space Grotesk', sans-serif); font-weight: 600; font-size: 2.5rem; letter-spacing: -0.02em; }
    .page-case .cs-outcome-label { color: var(--fg2); }
    .page-case .footer { background: transparent; }

    /* === ABOUT PAGE === */
    .about-grid { display: grid; grid-template-columns: 1fr 380px; gap: 6rem; padding: 5rem 0; }
    .about-placeholder {
      width: 100%; aspect-ratio: 3/4; border-radius: 4px;
      overflow: hidden; position: relative; background: var(--bg2);
    }
    .about-placeholder svg { width: 100%; height: 100%; }
    .about-placeholder-label {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 0.75rem; color: var(--fg3); text-align: center;
    }
    .about-content { }
    .about-name {
      font-family: var(--font-serif, var(--font-title, 'Cormorant Garamond', serif));
      font-size: clamp(3rem, 5vw, 5rem); font-weight: 600;
      line-height: 1.0; letter-spacing: -0.03em; color: var(--fg);
      margin-bottom: 0.5rem;
    }
    .about-role { font-size: 0.875rem; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin-bottom: 2rem; }
    .about-bio { font-size: 1.0625rem; line-height: 1.8; color: var(--fg2); font-weight: 300; text-wrap: pretty; margin-bottom: 2.5rem; }
    .about-philosophy { padding: 2rem; border-left: 2px solid var(--accent); background: var(--bg2); border-radius: 2px; margin-bottom: 2.5rem; }
    .about-philosophy p { font-family: var(--font-serif, 'Cormorant Garamond', serif); font-size: 1.375rem; font-style: italic; line-height: 1.6; color: var(--fg); font-weight: 400; }
    .about-philosophy cite { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--fg3); margin-top: 0.75rem; font-style: normal; letter-spacing: 0.06em; text-transform: uppercase; }

    .skills-section { border-top: 2px solid var(--border); padding-top: 4rem; padding-bottom: 5rem; }

  };

  React.useEffect(() => {
    const f = sansFonts[tweaks.sansFont] || sansFonts['space-grotesk'];
    document.body.style.setProperty('--font-sans', f);
    document.body.style.fontFamily = f;
  }, [tweaks.sansFont]);

  React.useEffect(() => {
    const f = serifFonts[tweaks.serifFont] || serifFonts['cormorant'];
    document.body.style.setProperty('--font-serif', f);
  }, [tweaks.serifFont]);

  const pairingFonts = {
    classic: { display: "var(--font-serif, 'Cormorant Garamond', serif)", title: "var(--font-serif, 'Cormorant Garamond', serif)" },
    mixed:   { display: "var(--font-serif, 'Cormorant Garamond', serif)", title: "var(--font-sans, 'Space Grotesk', sans-serif)" },
    modern:  { display: "var(--font-sans, 'Space Grotesk', sans-serif)",  title: "var(--font-sans, 'Space Grotesk', sans-serif)" },
  };

  React.useEffect(() => {
    const p = pairingFonts[tweaks.typePairing] || pairingFonts.mixed;
    document.body.style.setProperty('--font-display', p.display);
    document.body.style.setProperty('--font-title', p.title);
    // modern: italic accent uses serif, else same as display
    const accentFont = tweaks.typePairing === 'modern' ? "'Cormorant Garamond', serif" : p.display;
    document.body.style.setProperty('--font-accent', accentFont);
  }, [tweaks.typePairing]);

  function setView(v) {
    setViewRaw(v);
    setKey(k => k + 1);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  return (
    <>

      <div key={key}>
        {view.page === 'home' && <HomePage view={view} setView={setView} tweaks={tweaks} />}
        {view.page === 'case' && <CaseStudyPage id={view.id} view={view} setView={setView} />}
        {view.page === 'about' && <AboutPage view={view} setView={setView} />}
      </div>

      <TweaksPanel>
        <TweakSection title="Type">
          <TweakRadio
            label="Pairing"
            value={tweaks.typePairing}
            options={[
              { label: 'Classic', value: 'classic' },
              { label: 'Mixed', value: 'mixed' },
              { label: 'Modern', value: 'modern' }
            ]}
            onChange={v => setTweak('typePairing', v)}
          />
          <TweakSelect
            label="Serif font"
            value={tweaks.serifFont}
            options={[
              { label: 'Cormorant Garamond', value: 'cormorant' },
              { label: 'Fraunces', value: 'fraunces' },
              { label: 'Playfair Display', value: 'playfair' },
              { label: 'DM Serif Display', value: 'dm-serif' },
            ]}
            onChange={v => setTweak('serifFont', v)}
          />
          <TweakSelect
            label="Sans font"
            value={tweaks.sansFont}
            options={[
              { label: 'DM Sans', value: 'dm-sans' },
              { label: 'Space Grotesk', value: 'space-grotesk' },
              { label: 'Plus Jakarta Sans', value: 'plus-jakarta' },
              { label: 'Outfit', value: 'outfit' },
            ]}
            onChange={v => setTweak('sansFont', v)}
          />
        </TweakSection>
        <TweakSection title="Theme">
          <TweakRadio
            label="Color theme"
            value={tweaks.theme}
            options={[
              { label: 'Warm', value: 'warm' },
              { label: 'Slate', value: 'slate' },
              { label: 'Dark', value: 'dark' }
            ]}
            onChange={v => setTweak('theme', v)}
          />
        </TweakSection>
        <TweakSection title="Content">
          <TweakToggle label="Show hero stats" value={tweaks.showStats} onChange={v => setTweak('showStats', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
